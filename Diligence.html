<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jericho Due Diligence Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3a5c;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --red: #c0392b;
    --red-soft: #e74c3c;
    --amber: #d4861a;
    --green: #1a7a4a;
    --green-soft: #27ae60;
    --white: #f5f0e8;
    --gray: #8a9bb0;
    --gray-light: #c5cdd8;
    --border: rgba(201,168,76,0.2);
    --glass: rgba(17,34,64,0.85);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-box-sizing: border-box; }

html { background: #f5f0e8; }

body {
background-color: #f5f0e8 !important;
background: #f5f0e8 !important;
color: #111111 !important;
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
-webkit-text-size-adjust: 100%;
}

/* Background texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.05) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(26,58,92,0.4) 0%, transparent 50%),
repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(201,168,76,0.015) 50px, rgba(201,168,76,0.015) 51px),
repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(201,168,76,0.015) 50px, rgba(201,168,76,0.015) 51px);
pointer-events: none;
z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

/* header already defined above */
.logo-block { display: flex; flex-direction: column; }
.logo-name {
font-family: ‘Playfair Display’, serif;
font-size: 28px;
font-weight: 900;
letter-spacing: 3px;
color: #c9a84c;
text-transform: uppercase;
}
.logo-sub {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 4px;
color: #777777;
text-transform: uppercase;
margin-top: 4px;
}
.header-right { display: flex; gap: 12px; }
.nav-btn {
background: transparent;
border: 1px solid rgba(10,22,40,0.3);
color: #444;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 8px 16px;
cursor: pointer;
transition: all 0.2s;
border-radius: 2px;
}
.nav-btn:hover, .nav-btn.active {
border-color: #0a1628;
color: #ffffff;
background: #0a1628;
}

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Search Panel */
.search-panel {
background: #ffffff !important;
background-color: #ffffff !important;
border: 1px solid rgba(10,22,40,0.15);
border-radius: 4px;
padding: 36px;
margin-bottom: 32px;
box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.panel-title {
font-family: ‘Playfair Display’, serif;
font-size: 20px;
color: #c9a84c;
margin-bottom: 28px;
letter-spacing: 1px;
}

.header {
padding: 40px 0 30px;
border-bottom: 2px solid #c9a84c;
margin-bottom: 40px;
display: flex;
align-items: center;
justify-content: space-between;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-group.full { grid-column: 1 / -1; }
label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 3px;
text-transform: uppercase;
color: #555555;
}
input, select, textarea {
background: #f9f7f3 !important;
background-color: #f9f7f3 !important;
border: 1px solid #cccccc !important;
color: #111111 !important;
-webkit-text-fill-color: #111111 !important;
font-family: ‘DM Sans’, sans-serif;
font-size: 16px;
padding: 12px 16px;
border-radius: 2px;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
appearance: none;
}
input::placeholder, textarea::placeholder { color: #999999 !important; -webkit-text-fill-color: #999999 !important; opacity: 1; }
input:focus, select:focus, textarea:focus { border-color: #c9a84c !important; }
select option { background: #ffffff; color: #111111; }
textarea { resize: vertical; min-height: 80px; }

.sector-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.sector-tag {
background: #f5f2ec;
border: 1px solid #cccccc;
color: #555555;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
padding: 8px 10px;
text-align: center;
cursor: pointer;
border-radius: 2px;
transition: all 0.2s;
text-transform: uppercase;
}
.sector-tag.selected {
background: #0a1628;
border-color: #0a1628;
color: #ffffff;
}

.run-btn {
width: 100%;
background: #0a1628;
border: none;
color: #ffffff;
font-family: ‘Playfair Display’, serif;
font-size: 16px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
padding: 18px;
cursor: pointer;
border-radius: 2px;
transition: all 0.3s;
margin-top: 24px;
}
.run-btn:hover { background: #1a3a5c; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(10,22,40,0.3); }
.run-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* Progress */
.progress-panel {
background: #ffffff !important;
background-color: #ffffff !important;
border: 2px solid #0a1628;
border-radius: 4px;
padding: 32px;
margin-bottom: 32px;
display: none;
box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.progress-panel.active { display: block !important; }
.progress-title {
font-family: ‘DM Mono’, monospace;
font-size: 13px;
letter-spacing: 3px;
text-transform: uppercase;
color: #0a1628 !important;
margin-bottom: 20px;
font-weight: bold;
}
.progress-bar-wrap {
height: 10px;
background: #e8e4dc;
border-radius: 5px;
margin-bottom: 24px;
overflow: hidden;
border: 1px solid #cccccc;
}
.progress-bar {
height: 100%;
background: #c9a84c;
border-radius: 5px;
transition: width 0.4s ease;
width: 0%;
}
.progress-steps { display: flex; flex-direction: column; gap: 10px; }
.step-item {
display: flex;
align-items: center;
gap: 12px;
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: #999999;
transition: color 0.3s;
}
.step-item.done { color: #1a7a4a !important; }
.step-item.active { color: #0a1628 !important; font-weight: bold; }
.step-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: currentColor;
flex-shrink: 0;
}
.step-item.active .step-dot { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Results */
.results-panel { display: none; }
.results-panel.active { display: block; }

.score-banner {
display: flex;
align-items: center;
justify-content: space-between;
padding: 28px 36px;
border-radius: 4px;
margin-bottom: 28px;
border: 1px solid;
}
.score-banner.green { background: rgba(26,122,74,0.15); border-color: var(–green-soft); }
.score-banner.amber { background: rgba(212,134,26,0.15); border-color: var(–amber); }
.score-banner.red { background: rgba(192,57,43,0.15); border-color: var(–red-soft); }

.score-left { display: flex; flex-direction: column; gap: 6px; }
.score-company { font-family: ‘Playfair Display’, serif; font-size: 24px; font-weight: 700; }
.score-meta { font-family: ‘DM Mono’, monospace; font-size: 11px; letter-spacing: 2px; color: var(–gray); }
.score-right { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.score-number { font-family: ‘Playfair Display’, serif; font-size: 56px; font-weight: 900; line-height: 1; }
.score-banner.green .score-number { color: var(–green-soft); }
.score-banner.amber .score-number { color: var(–amber); }
.score-banner.red .score-number { color: var(–red-soft); }
.score-label { font-family: ‘DM Mono’, monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.score-banner.green .score-label { color: var(–green-soft); }
.score-banner.amber .score-label { color: var(–amber); }
.score-banner.red .score-label { color: var(–red-soft); }

.result-tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid #dddddd; }
.result-tab {
background: transparent;
border: none;
border-bottom: 2px solid transparent;
color: #777777;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 14px 20px;
cursor: pointer;
transition: all 0.2s;
margin-bottom: -1px;
}
.result-tab:hover { color: #0a1628; }
.result-tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }

.result-content { padding-top: 28px; }
.result-section { display: none; }
.result-section.active { display: block; }

/* Red Flags */
.red-flags-box {
background: rgba(192,57,43,0.1);
border: 1px solid rgba(192,57,43,0.4);
border-left: 4px solid var(–red-soft);
border-radius: 4px;
padding: 24px;
margin-bottom: 24px;
}
.red-flags-title {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–red-soft);
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 8px;
}
.flag-item {
display: flex;
gap: 12px;
padding: 10px 0;
border-bottom: 1px solid rgba(192,57,43,0.15);
font-size: 13px;
line-height: 1.5;
}
.flag-item:last-child { border-bottom: none; }
.flag-icon { color: var(–red-soft); font-size: 14px; flex-shrink: 0; margin-top: 1px; }

/* Conflict box */
.conflict-box {
background: rgba(212,134,26,0.08);
border: 1px solid rgba(212,134,26,0.3);
border-left: 4px solid var(–amber);
border-radius: 4px;
padding: 20px;
margin-bottom: 16px;
}
.conflict-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
color: var(–amber);
text-transform: uppercase;
margin-bottom: 8px;
}
.conflict-row { display: flex; gap: 16px; font-size: 13px; }
.conflict-claim { color: var(–gray); }
.conflict-claim span { color: var(–white); }
.conflict-found { color: var(–amber); font-weight: 500; }

/* Info cards */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.info-card {
background: #ffffff !important;
background-color: #ffffff !important;
border: 1px solid #dddddd;
border-radius: 4px;
padding: 20px;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.info-card-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
color: #777777;
text-transform: uppercase;
margin-bottom: 8px;
}
.info-card-value { font-size: 14px; line-height: 1.6; color: #111111; }
.info-card-value.ok { color: #1a7a4a; }
.info-card-value.warn { color: #d4861a; }
.info-card-value.bad { color: #c0392b; }

/* Person cards */
.person-card {
background: #ffffff !important;
background-color: #ffffff !important;
border: 1px solid #dddddd;
border-radius: 4px;
padding: 20px;
margin-bottom: 16px;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.person-name { font-family: ‘Playfair Display’, serif; font-size: 17px; margin-bottom: 4px; color: #111111; }
.person-role { font-family: ‘DM Mono’, monospace; font-size: 10px; letter-spacing: 2px; color: #777777; text-transform: uppercase; margin-bottom: 14px; }
.person-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.check-badge {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
padding: 4px 10px;
border-radius: 2px;
text-transform: uppercase;
}
.check-badge.clear { background: rgba(26,122,74,0.2); color: var(–green-soft); border: 1px solid rgba(26,122,74,0.3); }
.check-badge.flagged { background: rgba(192,57,43,0.2); color: var(–red-soft); border: 1px solid rgba(192,57,43,0.3); }
.check-badge.unknown { background: rgba(138,155,176,0.1); color: var(–gray); border: 1px solid rgba(138,155,176,0.2); }

/* Raw dump */
.raw-dump {
background: #f0ede6 !important;
background-color: #f0ede6 !important;
border: 1px solid #cccccc;
border-radius: 4px;
padding: 24px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
line-height: 1.8;
color: #333333;
white-space: pre-wrap;
max-height: 600px;
overflow-y: auto;
}
border-radius: 4px;
padding: 24px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
line-height: 1.8;
color: var(–gray-light);
white-space: pre-wrap;
max-height: 600px;
overflow-y: auto;
}
.raw-dump::-webkit-scrollbar { width: 4px; }
.raw-dump::-webkit-scrollbar-track { background: transparent; }
.raw-dump::-webkit-scrollbar-thumb { background: var(–gold); border-radius: 2px; }

/* Action buttons */
.action-row { display: flex; gap: 12px; margin-top: 28px; }
.action-btn {
background: transparent;
border: 1px solid #cccccc;
color: #555555;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 12px 20px;
cursor: pointer;
border-radius: 2px;
transition: all 0.2s;
display: flex;
align-items: center;
gap: 8px;
}
.action-btn:hover { border-color: #0a1628; color: #0a1628; }
.action-btn.primary {
background: #0a1628;
border-color: #0a1628;
color: #ffffff;
}
.action-btn.primary:hover { background: #1a3a5c; }

.small-btn {
background: transparent;
border: 1px solid #cccccc;
color: #555555;
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
padding: 6px 12px;
cursor: pointer;
border-radius: 2px;
transition: all 0.2s;
text-transform: uppercase;
}
.small-btn:hover { border-color: #c9a84c; color: #c9a84c; }

/* History */
.history-list { display: flex; flex-direction: column; gap: 12px; }
.history-item {
background: #ffffff !important;
background-color: #ffffff !important;
border: 1px solid #dddddd;
border-radius: 4px;
padding: 20px 24px;
display: flex;
align-items: center;
justify-content: space-between;
cursor: pointer;
transition: border-color 0.2s;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.history-item:hover { border-color: #c9a84c; }
.history-company { font-family: ‘Playfair Display’, serif; font-size: 17px; color: #111111; }
.history-meta { font-family: ‘DM Mono’, monospace; font-size: 10px; letter-spacing: 2px; color: #777777; text-transform: uppercase; }
.history-right { display: flex; align-items: center; gap: 16px; }
.score-pill {
font-family: ‘Playfair Display’, serif;
font-size: 20px;
font-weight: 700;
min-width: 48px;
text-align: center;
}
.score-pill.green { color: var(–green-soft); }
.score-pill.amber { color: var(–amber); }
.score-pill.red { color: var(–red-soft); }
.history-btns { display: flex; gap: 8px; }
.small-btn {
background: transparent;
border: 1px solid var(–border);
color: var(–gray);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
padding: 6px 12px;
cursor: pointer;
border-radius: 2px;
transition: all 0.2s;
text-transform: uppercase;
}
.small-btn:hover { border-color: var(–gold); color: var(–gold); }

/* Document upload */
.doc-upload-area {
border: 1px dashed rgba(201,168,76,0.3);
border-radius: 4px;
padding: 24px;
text-align: center;
cursor: pointer;
transition: all 0.2s;
margin-top: 16px;
}
.doc-upload-area:hover { border-color: var(–gold); background: rgba(201,168,76,0.03); }
.doc-upload-label { font-family: ‘DM Mono’, monospace; font-size: 11px; letter-spacing: 2px; color: var(–gray); text-transform: uppercase; }
.doc-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.doc-item {
display: flex;
align-items: center;
justify-content: space-between;
background: rgba(17,34,64,0.6);
border: 1px solid var(–border);
border-radius: 2px;
padding: 10px 14px;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–gray-light);
}

/* Section headers */
.section-header {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 4px;
text-transform: uppercase;
color: #c9a84c;
margin-bottom: 16px;
padding-bottom: 8px;
border-bottom: 1px solid #dddddd;
}

.prose { font-size: 14px; line-height: 1.8; color: #333333; margin-bottom: 20px; }
.prose strong { color: #111111; }

/* Empty state */
.empty-state {
text-align: center;
padding: 60px 20px;
color: var(–gray);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 2px;
}

/* File input hidden */
#fileInput { display: none; }

.spinner {
display: inline-block;
width: 14px; height: 14px;
border: 2px solid rgba(255,255,255,0.3);
border-top-color: #ffffff;
border-radius: 50%;
animation: spin 0.8s linear infinite;
vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 640px) {
.form-grid { grid-template-columns: 1fr; }
.info-grid { grid-template-columns: 1fr; }
.sector-grid { grid-template-columns: repeat(2, 1fr); }
.score-banner { flex-direction: column; gap: 20px; text-align: center; }
.header { flex-direction: column; gap: 16px; align-items: flex-start; }
}
</style>

</head>

  <div class="form-grid">

      <label>Company Name *</label>
      <input type="text" id="companyName" placeholder="e.g. Gramazini Mineração Ltda">

<script>
// ── State ──────────────────────────────────────────────────────────────

// ── UI Navigation ───────────────────────────────────────────────────────

// ── Research Runner ─────────────────────────────────────────────────────
let timerInterval = null;

function startTimer() {
  let seconds = 0;
  const timerEl = document.getElementById('runTimer');
  if (timerEl) timerEl.textContent = '00:00';
  timerInterval = setInterval(() => {
    seconds++;
    const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
    const ss = String(seconds % 60).padStart(2, '0');
    if (timerEl) timerEl.textContent = mm + ':' + ss;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

async function runResearch() {
  const company = document.getElementById('companyName').value.trim();
  const country = document.getElementById('companyCountry').value.trim();
  if (!company || !country) { alert('Please enter at least a company name and country.'); return; }

  const website = document.getElementById('companyWebsite').value.trim();

  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').innerHTML = '<span class="spinner"></span> &nbsp; Searching...';
  document.getElementById('progressPanel').classList.add('active');
  document.getElementById('resultsPanel').classList.remove('active');

  const steps = [
    'Accessing company website & extracting team data',
    'Searching government corporate registries',
    'Checking OFAC · EU · UN · World Bank sanctions lists',
    'Scanning PEP & adverse media databases',
    'Verifying registered addresses',
    'Searching court records & litigation history',
    'Checking Dun & Bradstreet & trade intelligence',
    'Verifying mining concessions & land registries',
    'Searching export records & customs data',
    'Deep-diving individual board members',
    'Cross-referencing all findings & scoring',
    'Compiling final report'
  ];

  renderProgressSteps(steps);
  startTimer();

  // Run animation and API call in parallel
  const prompt = buildPrompt(company, country, website, keyPerson, sectors, notes);
  const [raw] = await Promise.all([
    callClaude(prompt),
    animateProgress(steps)
  ]);

  stopTimer();
  currentResult = { company, country, website, keyPerson, sectors, notes, raw, date: new Date().toISOString() };

  renderResults(currentResult);

function renderProgressSteps(steps) {

async function animateProgress(steps) {
  const bar = document.getElementById('progressBar');
  for (let i = 0; i < steps.length; i++) {
    document.querySelectorAll('.step-item').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('step-' + i);

    if (el) { el.classList.remove('active'); el.classList.add('done'); }
  }
  bar.style.width = '100%';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Prompt Builder ──────────────────────────────────────────────────────
function buildPrompt(company, country, website, keyPerson, sectors, notes) {

// ── Claude API Call ─────────────────────────────────────────────────────
async function callClaude(prompt) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await response.json();

  // Extract text from all content blocks
  let text = '';
  if (data.content) {
    for (const block of data.content) {
      if (block.type === 'text') text += block.text;
    }
  }

  // Strip markdown fences if present
  text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();

  try {
    return JSON.parse(text);
  } catch (e) {
    // Try to extract JSON from the text
    const match = text.match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch (e2) {}
    }
    return { error: true, rawText: text };
  }
}

      ${infoCard('Legal Form', co.legalForm)}
      ${infoCard('Years in Operation', co.yearsInOperation)}
      ${infoCard('Registered Address', co.registeredAddress)}
      ${infoCard('Address Type', co.addressType, addressColor(co.addressType))}
    </div>

    <div class="info-grid">
      ${infoCard('Sanctions Status', co.sanctionsStatus, checkColor(co.sanctionsStatus))}
      ${infoCard('Blacklist / Debarment', co.blacklistStatus, checkColor(co.blacklistStatus))}
      ${infoCard('Litigation', co.litigation)}
      ${infoCard('Financial Status', co.financialStatus)}
      ${infoCard('Credit Rating (D&B)', co.creditRating)}
      ${infoCard('Trade History', co.tradeHistory)}
    </div>
    ${co.additionalFindings ? `<div class="section-header">Additional Findings</div><div class="prose">${co.additionalFindings}</div>` : ''}
  `;

  // People tab
  const people = r.people || [];
  let peopleHTML = '';
  if (people.length === 0) {
    peopleHTML = '<div class="prose">No individuals identified.</div>';
  } else {
    people.forEach(p => {
      peopleHTML += `
        <div class="person-card">
          <div class="person-name">${p.name}</div>
          <div class="person-role">${p.role} · Source: ${p.source} · ${p.verified ? '✓ Verified externally' : '⚠ Unverified externally'}</div>
          <div class="person-checks">
            ${badge('Sanctions', p.sanctionsCheck)}
            ${badge('PEP', p.pepCheck)}
            ${badge('Court Records', p.courtRecords)}
            ${badge('Bankruptcy', p.bankruptcyCheck)}
            ${badge('Fraud Registry', p.fraudRegistry)}
            ${badge('Adverse Media', p.adverseMedia)}
          </div>
          ${p.notes ? `<div class="prose" style="margin-top:12px;margin-bottom:0;">${p.notes}</div>` : ''}
        </div>
      `;
    });
  }
  document.getElementById('tab-people').innerHTML = `<div class="section-header">Board Members & Key Individuals</div>${peopleHTML}`;

  // Mining & Trade tab
  const mt = r.miningAndTrade || {};
  document.getElementById('tab-mining').innerHTML = `

      ${infoCard('Mining Area Status', mt.miningAreaStatus, miningColor(mt.miningAreaStatus))}
    </div>
    <div class="section-header">Export & Trade Records</div>
    <div class="info-grid">
      ${infoCard('Export Records', mt.exportRecords)}
      ${infoCard('Trade Data Sources', mt.tradeDataSources)}
    </div>
    <div class="section-header">Registries Searched</div>
    <div class="prose">${mt.governmentRegistriesChecked || 'See raw dump for details.'}</div>
    ${mt.additionalFindings ? `<div class="section-header">Additional Findings</div><div class="prose">${mt.additionalFindings}</div>` : ''}
  `;

  // Raw dump tab
  document.getElementById('tab-raw').innerHTML = `

function renderFlagBox(flags, title, color) {
  return `
    <div class="red-flags-box" style="border-left-color:${color};background:${color}18;border-color:${color}55;">
      <div class="red-flags-title" style="color:${color};">⚑ &nbsp;${title} (${flags.length})</div>
      ${flags.map(f => `
        <div class="flag-item">
          <div class="flag-icon" style="color:${color};">▲</div>
          <div><strong style="color:${color};">[${f.category}]</strong> ${f.description}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function infoCard(label, value, colorClass) {
  return `
    <div class="info-card">
      <div class="info-card-label">${label}</div>
      <div class="info-card-value ${colorClass || ''}">${value || 'Not found'}</div>
    </div>
  `;
}

function badge(label, status) {
  const cls = status === 'clear' ? 'clear' : status === 'flagged' ? 'flagged' : 'unknown';
  const icon = status === 'clear' ? '✓' : status === 'flagged' ? '✕' : '?';
  return `<div class="check-badge ${cls}">${icon} ${label}</div>`;
}

function statusColor(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('active')) return 'ok';
  if (l.includes('inactive') || l.includes('not found')) return 'bad';
  return 'warn';
}

function checkColor(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('clear')) return 'ok';
  if (l.includes('flagged')) return 'bad';
  return 'warn';
}

function addressColor(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('real') || l.includes('verified office')) return 'ok';
  if (l.includes('virtual') || l.includes('flexi') || l.includes('residential')) return 'warn';
  return '';
}

function miningColor(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('verified active')) return 'ok';
  if (l.includes('another entity') || l.includes('no record')) return 'bad';
  return 'warn';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function saveToHistory() {
  if (!currentResult) return;
  // Avoid exact duplicates
  const idx = researchHistory.findIndex(h => h.company === currentResult.company && h.country === currentResult.country && h.date === currentResult.date);
  if (idx === -1) researchHistory.unshift(currentResult);
  localStorage.setItem('jdd_history', JSON.stringify(researchHistory.slice(0, 100)));
  alert('Saved to history.');
}

function renderHistory() {
  const el = document.getElementById('historyList');

    el.innerHTML = '<div class="empty-state">No research history yet.</div>';

  }

  el.innerHTML = '<div class="history-list">' + researchHistory.map((h, i) => {
    const score = h.raw?.score ?? '—';
    const colorClass = typeof score === 'number' ? (score >= 76 ? 'green' : score >= 60 ? 'amber' : 'red') : '';
    const runs = h.runs ? h.runs.length + 1 : 1;
    return `
      <div class="history-item">
        <div class="history-left">
          <div class="history-company">${h.company}</div>
          <div class="history-meta">${h.country} · ${h.sectors?.join(', ') || 'General'} · Last run: ${formatDate(h.date)} · ${runs} run${runs > 1 ? 's' : ''}</div>

            <button class="small-btn" onclick="loadFromHistory(${i})">View</button>
            <button class="small-btn" onclick="rerunFromHistory(${i})">Re-run</button>
            <button class="small-btn" onclick="showDocs(${i})">Docs</button>
          </div>
        </div>
      </div>
      <div id="docs-${i}" style="display:none;padding:0 0 12px;">
        <div class="doc-upload-area" onclick="triggerUpload(${i})">
          <div class="doc-upload-label">+ Attach Document (SGS, License, Past Performance...)</div>
        </div>
        <div class="doc-list" id="doclist-${i}">
          ${(h.docs || []).map(d => `<div class="doc-item"><span>${d.name}</span><span style="color:var(--gray)">${d.date}</span></div>`).join('')}
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

function loadFromHistory(i) {
  currentResult = researchHistory[i];
  showView('search'); // switch to search view to show results
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.nav-btn').classList.add('active');
  document.getElementById('companyName').value = currentResult.company;
  document.getElementById('companyCountry').value = currentResult.country;
  document.getElementById('companyWebsite').value = currentResult.website || '';
  document.getElementById('keyPerson').value = currentResult.keyPerson || '';
  document.getElementById('resultsPanel').classList.add('active');
  renderResults(currentResult);
}

async function rerunFromHistory(i) {
  const h = researchHistory[i];
  document.getElementById('companyName').value = h.company;
  document.getElementById('companyCountry').value = h.country;
  document.getElementById('companyWebsite').value = h.website || '';
  document.getElementById('keyPerson').value = h.keyPerson || '';
  showView('search');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.nav-btn').classList.add('active');
  await runResearch();
  // Save as new run
  if (!researchHistory[i].runs) researchHistory[i].runs = [];
  researchHistory[i].runs.push({ date: new Date().toISOString(), score: currentResult.raw?.score });
  researchHistory[i].date = new Date().toISOString();
  researchHistory[i].raw = currentResult.raw;
  localStorage.setItem('jdd_history', JSON.stringify(researchHistory));
}

function showDocs(i) {
  const el = document.getElementById('docs-' + i);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function triggerUpload(i) {
  const fi = document.getElementById('fileInput');
  fi.onchange = () => {
    const files = [...fi.files];
    if (!researchHistory[i].docs) researchHistory[i].docs = [];
    files.forEach(f => {
      researchHistory[i].docs.push({ name: f.name, date: formatDate(new Date().toISOString()) });
    });
    localStorage.setItem('jdd_history', JSON.stringify(researchHistory));
    renderHistory();
  };
  fi.click();
}

  .score-num { font-size: 36px; font-weight: bold; }
  h2 { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #0a1628; border-bottom: 1px solid #ddd; padding-bottom: 6px; margin: 28px 0 14px; }
  .prose { font-size: 13px; line-height: 1.8; color: #333; }
  .flag { padding: 10px 14px; margin-bottom: 8px; border-left: 4px solid #e74c3c; background: #fff5f5; font-size: 12px; }
  .flag.medium { border-color: #d4861a; background: #fdf8f0; }
  .flag.low { border-color: #aaa; background: #f8f8f8; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
  td:first-child { font-weight: bold; color: #0a1628; width: 35%; }
  .footer { margin-top: 60px; padding-top: 16px; border-top: 1px solid #ddd; font-size: 10px; color: #999; font-family: monospace; }
  .confidential { color: #c0392b; font-weight: bold; letter-spacing: 2px; font-size: 11px; }
</style>

</head>
<body>
<div class="header">
  <div style="font-family:monospace;font-size:11px;letter-spacing:3px;color:#c0392b;margin-bottom:12px;">STRICTLY CONFIDENTIAL</div>
  <div class="co-name">${currentResult.company}</div>
  <div class="meta">${currentResult.country} · ${currentResult.sectors?.join(', ') || 'General'} · Report Date: ${formatDate(currentResult.date)}</div>
  <div class="meta" style="margin-top:4px;">Prepared by: Jericho Due Diligence Engine</div>
  <div class="score-box ${score >= 76 ? 'green' : score >= 60 ? 'amber' : 'red'}" style="margin-top:16px;">
    <div class="score-num">${score}/100</div>
    <div style="font-size:11px;letter-spacing:2px;font-family:monospace;">${colorLabel}</div>
  </div>
</div>

<h2>Executive Summary</h2>
<div class="prose">${(r.executiveSummary || '').replace(/\n/g, '<br>')}</div>

<h2>Score Rationale</h2>
<div class="prose">${r.scoreRationale || ''}</div>

${(r.redFlags || []).length ? `

<h2>Red Flags</h2>
${(r.redFlags || []).map(f => `<div class="flag ${f.severity}"><strong>[${f.severity.toUpperCase()}] ${f.category}</strong><br>${f.description}</div>`).join('')}
` : ''}

${(r.conflicts || []).length ? `

<h2>Claim vs. Independent Findings</h2>
${(r.conflicts || []).map(c => `<div class="flag medium"><strong>${c.field}</strong><br>Claimed: ${c.claimed}<br>Found: ${c.found}</div>`).join('')}
` : ''}

<h2>Company Information</h2>
<table>
${Object.entries(r.company || {}).map(([k, v]) => v ? `<tr><td>${k.replace(/([A-Z])/g,' $1').trim()}</td><td>${v}</td></tr>` : '').join('')}
</table>

<h2>People — Board Members & Directors</h2>
${(r.people || []).map(p => `
<table>
<tr><td>Name</td><td>${p.name}</td></tr>
<tr><td>Role</td><td>${p.role}</td></tr>
<tr><td>Verified</td><td>${p.verified ? 'Yes' : 'No'}</td></tr>
<tr><td>Sanctions</td><td>${p.sanctionsCheck}</td></tr>
<tr><td>PEP</td><td>${p.pepCheck}</td></tr>
<tr><td>Court Records</td><td>${p.courtRecords}</td></tr>
<tr><td>Bankruptcy</td><td>${p.bankruptcyCheck}</td></tr>
<tr><td>Fraud Registry</td><td>${p.fraudRegistry}</td></tr>
<tr><td>Notes</td><td>${p.notes || '—'}</td></tr>
</table>`).join('')}

<h2>Mining & Trade</h2>
<table>
${Object.entries(r.miningAndTrade || {}).map(([k, v]) => v !== null && v !== undefined ? `<tr><td>${k.replace(/([A-Z])/g,' $1').trim()}</td><td>${v}</td></tr>` : '').join('')}
</table>

<div class="footer">
  <div class="confidential">STRICTLY CONFIDENTIAL — JERICHO DUE DILIGENCE ENGINE</div>
  <div style="margin-top:6px;">This report is generated for internal screening purposes only. All findings should be verified by qualified legal and compliance professionals before commercial decisions are made. © Jericho ${new Date().getFullYear()}</div>
</div>

</body>
</html>
  `);
  printWindow.document.close();
  setTimeout(() => printWindow.print(), 800);
}

// ── Helpers ──────────────────────────────────────────────────────────────
function resetSearch() {
document.getElementById(‘companyName’).value = ‘’;
document.getElementById(‘companyCountry’).value = ‘’;
document.getElementById(‘companyWebsite’).value = ‘’;
document.getElementById(‘keyPerson’).value = ‘’;
document.getElementById(‘extraNotes’).value = ‘’;
document.querySelectorAll(’.sector-tag’).forEach(t => t.classList.remove(‘selected’));
document.getElementById(‘resultsPanel’).classList.remove(‘active’);
document.getElementById(‘progressPanel’).classList.remove(‘active’);
currentResult = null;
}
</script>

</body>
</html>
