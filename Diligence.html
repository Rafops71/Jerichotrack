<body>
<div class="app">
  <!-- Your full original body content (header, search panel, progress, results, history) remains exactly as you sent it -->
  <!-- ... (the entire body you pasted is kept intact) ... -->

  <script>
    // Improved parsing function (Claude + Grok fixes)
    function safeParseResponse(text) {
      text = text.replace(/^JSON\s*/i, '').replace(/```json|```/gi, '').trim();

      const start = text.indexOf('{');
      if (start === -1) return null;

      let depth = 0;
      let end = -1;
      for (let i = start; i < text.length; i++) {
        if (text[i] === '{') depth++;
        else if (text[i] === '}') {
          depth--;
          if (depth === 0) { end = i; break; }
        }
      }

      if (end !== -1) {
        try {
          return JSON.parse(text.slice(start, end + 1));
        } catch (e) {}
      }
      return null;
    }

    // In your callWorker function, replace the parsing part with this:
    let parsed = safeParseResponse(text);
    if (parsed) return parsed;
    else return { error: true, rawText: text || 'No content returned from Worker.' };

    // formatFindings function (handles arrays/objects)
    function formatFindings(val) {
      if (!val) return '';
      if (typeof val === 'string') return val;
      if (Array.isArray(val)) {
        return val.map(item => {
          if (typeof item === 'string') return item;
          if (item && typeof item === 'object') {
            if (item.finding) return item.finding + (item.confidence ? ' (' + item.confidence + ')' : '');
            if (item.name) return item.name + (item.role ? ' - ' + item.role : '');
            return Object.values(item).join(', ');
          }
          return String(item);
        }).join('<br>');
      }
      return String(val);
    }
  </script>
</div>
